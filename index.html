<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8" />
    <!-- https://developer.mozilla.org/en-US/docs/Web/HTTP/CSP -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <meta http-equiv="X-Content-Security-Policy" content="default-src 'self'; script-src 'self'" />
    <link rel="stylesheet" href="styles.css">
    <title>Sakupljač</title>
</head>

<body>
    <button id="start-btn">Start Game</button>
    <button id="reset-btn" style="display: none;">Reset Game</button>
    <input type="text" id="player1-name" placeholder="Enter player 1 name" />
    <input type="text" id="player2-name" placeholder="Enter player 2 name" />
    <div id="game" style="display: none;">
        <p id="status"></p>
        <p id="score"></p>
        <div id="grid"></div>
    </div>
    <script src="script.js"></script>
</body>

</html>
